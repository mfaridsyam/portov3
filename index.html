<html lang="en">
<head>
  <meta charset="UTF-8" />

  <title>Muh. Farid Syam | Portfolio</title>
  <meta name="description" content="Junior UI/UX Designer & Frontend Developer. Focused on creating clean interfaces and intuitive user experiences." />
  <meta name="keywords" content="Muhammad Farid Syam, Farid Syam, Portfolio, UI/UX Designer, Frontend Developer" />

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <script>
    document.addEventListener('contextmenu', function(e){ e.preventDefault() })
    document.addEventListener('keydown', function(e){
      if (e.key === 'F12') { e.preventDefault(); return }
      if (e.ctrlKey && e.shiftKey && ['c','C','i','I','j','J','k','K'].includes(e.key)) { e.preventDefault(); return }
      if (e.ctrlKey && ['u','U','s','S'].includes(e.key)) { e.preventDefault(); return }
    })
    document.addEventListener('selectstart', function(e){
      if (!e.target.closest('input,textarea')) e.preventDefault()
    })
  </script>
</head>
<body>
  <div id="app"></div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
